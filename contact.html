<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <title>Amy's Webpage</title>
    <link rel="shortcut icon" href="./img/rainbow_fab.svg">    
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
</head>
<body>
    <header class="page-header"> 
        <a href="index.html" class="logo-link"> 
            <img class="page-header__item" width="200" height="auto" src="img/logo.svg" alt="logo for this website reads Web Design Amy Sikora">
        </a>
        <nav class="main-navigation page-header__item">                                                      
            <ul role="menubar" class="navigation-list">
                <li role="presentation">
                    <a href="index.html" role="menuitem" class="navigation-list__item navigation-list__item--active">Home</a>
                </li>
                <li role="presentation">
                    <a href="about.html" role="menuitem" class="navigation-list__item">About Me</a>
                </li>
                <li role="presentation">
                    <a href="work.html" role="menuitem" class="navigation-list__item">Work</a>
                </li>
                <li role="presentation">
                    <a href="contact.html" role="menuitem" class="navigation-list__item">Contact</a>
                </li>
            </ul>
        </nav>    
    </header> 
    <main class="main_body_contact">
        <div class="contact-me">
            <h2>Want to learn more about my work?</h2>
        </div>
        <form id="contact-form">
            <h3>Please fill in your information below:</h3>
            <div class="input-wrapper">
                <label for="name">Name:</label>
                <input id="name" type="text" placeholder="Enter your name" required>
                <div class="error-message"></div>
            </div>
            <div class="input-wrapper">
                <label for="email">Email address:</label>
                <input id="email" type="email" placeholder="Enter your email" required>
                <div class="error-message"></div>
            </div>
            <button type="submit" class="button">Submit</button>
        </form>
    </main>
    
    <footer class="page-footer">
        <p>Find me on</p>
        <div class="social-media">
            <a href="http://amysikora.github.io/portfolio-website/" target="_blank">
                <img src="img/287725_github_icon.svg" alt="Github logo">
            </a>
            <a href="http://linkedin.com/in/amy-sikora-freelance/" target="_blank">
                <img src="img/104493_linkedin_icon.svg" alt="LinkedIn logo">
            </a>
        </div>
    </footer>
    <script src="js/scripts.js"></script>
  <script src="js/tota11y.min.js"></script>
</body>
</html>
